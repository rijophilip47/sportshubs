<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Broadcast - SportsHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1220;
    --ink-2:#0E1626;
    --card:#131C2E;
    --card-hover:#182236;
    --pitch:#1B7A43;
    --pitch-bright:#23A155;
    --amber:#F2B705;
    --white:#F5F7FA;
    --gray:#8CA0B3;
    --line:rgba(245,247,250,0.08);
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--white);
    font-family:'Inter',Arial,sans-serif;
    line-height:1.5;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -5%, rgba(27,122,67,0.25), transparent 60%),
      radial-gradient(ellipse 700px 400px at 100% 10%, rgba(242,183,5,0.10), transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  a{color:inherit;text-decoration:none;}
  .topbar{
    height:54px;
    background:rgba(14,22,38,.9);
    border-bottom:1px solid var(--line);
    position:relative;
    z-index:2;
  }
  .brand{
    max-width:1080px;
    height:54px;
    margin:0 auto;
    padding:0 18px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Anton',sans-serif;
    font-size:24px;
    letter-spacing:.04em;
  }
  .brand-bulb{
    width:12px;
    height:12px;
    border-radius:2px;
    background:var(--amber);
    box-shadow:0 0 12px 2px rgba(242,183,5,.7);
  }
  .brand span:last-child{color:var(--pitch-bright);}
  .page{
    position:relative;
    z-index:1;
    max-width:1080px;
    margin:24px auto 60px;
    padding:0 18px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
  }
  .breadcrumb{
    color:var(--pitch-bright);
    font-size:11px;
    font-weight:700;
    margin-bottom:8px;
  }
  h1{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:34px;
    line-height:1.1;
    letter-spacing:.03em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .player{
    min-height:360px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:
      linear-gradient(180deg, rgba(0,0,0,.28), rgba(0,0,0,.56)),
      radial-gradient(circle at 50% 42%, rgba(35,161,85,.25), transparent 35%),
      var(--ink-2);
    display:grid;
    place-items:center;
    text-align:center;
    padding:22px;
    margin-bottom:18px;
  }
  .play{
    width:74px;
    height:74px;
    border-radius:50%;
    display:grid;
    place-items:center;
    margin:0 auto 14px;
    background:var(--amber);
    color:#1a1400;
    font-size:28px;
    font-weight:800;
  }
  .player strong{
    display:block;
    font-size:18px;
    margin-bottom:6px;
  }
  .player span{
    color:var(--gray);
    font-size:13px;
  }
  .actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .button{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:40px;
    padding:10px 14px;
    border-radius:7px;
    font-weight:800;
    font-size:13px;
  }
  .button.primary{
    background:var(--pitch-bright);
    color:#08170D;
  }
  .button.secondary{
    border:1px solid var(--line);
    color:var(--white);
    background:var(--card-hover);
  }
  @media (max-width:560px){
    h1{font-size:26px;}
    .player{min-height:280px;}
    .actions{flex-direction:column;}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="brand-bulb"></span><span>SPORTS</span><span>HUB</span></div>
</div>

<main class="page">
  <section class="card" id="broadcastRoot"></section>
</main>

<script src="data.js"></script>
<script>
  function fallbackSlug(match){
    return match.slug || `${match.home}-${match.away}`.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  function getSelectedMatch(){
    const params = new URLSearchParams(window.location.search);
    const requested = params.get('match');
    return MATCHES.find(match => fallbackSlug(match) === requested) || MATCHES[0];
  }

  function getServerNumber(){
    const params = new URLSearchParams(window.location.search);
    return params.get('server') || '1';
  }

  function renderBroadcast(match){
    const server = getServerNumber();
    document.title = `${match.home} vs ${match.away} - Server ${server}`;
    document.getElementById('broadcastRoot').innerHTML = `
      <div class="breadcrumb">Home / Live Broadcast / Server ${server}</div>
      <h1>${match.home} vs ${match.away}</h1>
      <div class="player">
        <div>
          <div class="play">PLAY</div>
          <strong>Live Broadcast Server ${server}</strong>
          <span>${match.date} &middot; ${match.time} &middot; ${match.stadium}</span>
        </div>
      </div>
      <div class="actions">
        <a class="button primary" href="watch-live.html?match=${fallbackSlug(match)}&team=home">Back to live links</a>
        <a class="button secondary" href="match-details.html?match=${fallbackSlug(match)}">Match details</a>
        <a class="button secondary" href="index.html">All fixtures</a>
      </div>
    `;
  }

  renderBroadcast(getSelectedMatch());
</script>
</body>
</html>
